<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Play Chubby Bird, a fast browser arcade game from Moji Studios."
    />
    <link rel="canonical" href="https://moji-studios.com/chubbybird/" />
    <title>Chubby Bird - Moji Studios</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Chubby Bird game canvas"></canvas>

      <section class="hud" aria-live="polite">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="best">0</strong>
        </div>
        <div>
          <span class="label">Pace</span>
          <strong id="pace">1.0x</strong>
        </div>
      </section>

      <section id="overlay" class="overlay">
        <h1>Chubby Bird</h1>
        <p>Tap or Space to flap. Swipe right or double-tap Right to dash. Thread the gaps and keep the pace.</p>
        <button id="startButton" type="button">Start Run</button>
      </section>
    </main>

    <script src="game.js"></script>
  </body>
</html>
