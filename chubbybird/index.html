<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Play Chubby Bird, a fast browser arcade game from Moji Studios."
    />
    <link rel="canonical" href="https://moji-studios.com/chubbybird/" />
    <title>Chubby Bird - Moji Studios</title>
    <link rel="stylesheet" href="styles.css?v=perf-clean-1" />

    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2341433285023457"
         crossorigin="anonymous"></script>
  </head>
  <body>
    <main class="game-shell">
      <canvas id="game" aria-label="Chubby Bird game canvas"></canvas>

      <section class="hud" aria-live="polite">
        <div>
          <span class="label">Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span class="label">Best</span>
          <strong id="best">0</strong>
        </div>
        <div>
          <span class="label">Pace</span>
          <strong id="pace">1.0x</strong>
        </div>
      </section>

      <section id="leaderboardPanel" class="leaderboard-panel" aria-labelledby="leaderboardTitle">
        <div class="leaderboard-heading">
          <h2 id="leaderboardTitle">Weekly Top 20</h2>
          <button id="refreshLeaderboard" class="mini-button" type="button">Refresh</button>
        </div>
        <ol id="leaderboardList" class="leaderboard-list">
          <li class="empty-score">Loading scores...</li>
        </ol>
        <p id="leaderboardStatus" class="leaderboard-status">Current week</p>
        <form id="scoreSubmitForm" class="score-submit hidden">
          <label for="playerName">Save Score</label>
          <div>
            <input id="playerName" name="playerName" type="text" maxlength="12" autocomplete="nickname" placeholder="Your name" />
            <button id="scoreSubmitButton" type="submit">Save <span id="scoreSubmitValue">0</span></button>
          </div>
        </form>
      </section>

      <section id="overlay" class="overlay">
        <h1>Chubby Bird</h1>
        <p>Tap or Space to flap. Swipe up for a super jump. Swipe right or double-tap Right to dash. Pace cycles from 1.0x to 1.5x.</p>
        <button id="startButton" type="button">Start Run</button>
      </section>
    </main>

    <script src="game.js?v=bgm-1"></script>
  </body>
</html>
